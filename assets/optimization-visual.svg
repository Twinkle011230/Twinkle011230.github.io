<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Optimization path illustration</title>
  <desc id="desc">Abstract contour lines with a highlighted path moving toward an optimum.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fbfa"/>
      <stop offset="0.48" stop-color="#e2f0ed"/>
      <stop offset="1" stop-color="#fff7ef"/>
    </linearGradient>
    <linearGradient id="path" x1="0.1" x2="0.9" y1="0.25" y2="0.85">
      <stop offset="0" stop-color="#a64352"/>
      <stop offset="0.5" stop-color="#bd8b20"/>
      <stop offset="1" stop-color="#0b6b63"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#18201f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="900" fill="url(#bg)"/>
  <g fill="none" stroke="#0b6b63" stroke-opacity="0.18" stroke-width="16">
    <ellipse cx="492" cy="442" rx="314" ry="232" transform="rotate(-22 492 442)"/>
    <ellipse cx="492" cy="442" rx="242" ry="176" transform="rotate(-22 492 442)"/>
    <ellipse cx="492" cy="442" rx="172" ry="122" transform="rotate(-22 492 442)"/>
    <ellipse cx="492" cy="442" rx="104" ry="72" transform="rotate(-22 492 442)"/>
  </g>
  <g fill="none" stroke="#a64352" stroke-opacity="0.12" stroke-width="10">
    <path d="M49 184 C197 103 328 128 443 228 C543 315 657 349 850 288"/>
    <path d="M22 674 C177 582 329 578 476 663 C589 728 717 739 880 656"/>
    <path d="M104 812 C245 737 389 742 506 799 C603 846 708 850 807 801"/>
  </g>
  <path
    d="M157 651 C259 567 335 609 389 520 C438 439 520 477 567 386 C609 306 674 299 744 228"
    fill="none"
    filter="url(#softShadow)"
    stroke="url(#path)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="24"
  />
  <g fill="#ffffff" stroke="#0b6b63" stroke-width="12">
    <circle cx="157" cy="651" r="28"/>
    <circle cx="389" cy="520" r="24"/>
    <circle cx="567" cy="386" r="24"/>
    <circle cx="744" cy="228" r="32"/>
  </g>
  <circle cx="744" cy="228" r="11" fill="#bd8b20"/>
  <g fill="#18201f" opacity="0.78">
    <circle cx="205" cy="252" r="9"/>
    <circle cx="742" cy="531" r="7"/>
    <circle cx="285" cy="760" r="6"/>
    <circle cx="618" cy="690" r="8"/>
  </g>
</svg>
